name: BEI Screener

on:
  schedule:
    - cron: '00 21 * * 0-4'   # Senin–Jumat
    - cron: '00 09 * * 1-5'   # Senin–Jumat
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - run: pip install -r requirements.txt

    - run: python main.py
      env:
        TOKEN: ${{ secrets.TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
